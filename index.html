<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Viewport: cover=no evita zoom indevido em inputs iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO / App description -->
    <meta name="description" content="Aquimaq Log — Gestão de frota, tratores, operadores e rentabilidade agrícola." />
    <title>Aquimaq Log</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" crossorigin="anonymous" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Theme color — amarelo marca (Caterpillar-style) -->
    <meta name="theme-color" content="#ffcd11" />
    <meta name="msapplication-TileColor" content="#000000" />

    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aquimaq Log" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Aquimaq Log" />

    <!-- Prevent screen auto-detection of phone numbers on iOS -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
